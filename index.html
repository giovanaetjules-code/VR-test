<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VR Demo iPhone</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; height:100%; touch-action:none; }
  #canvas-wrap { position:fixed; inset:0; }
  #startBtn {
    position:fixed; inset:0; z-index:10; background:#111; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:sans-serif; font-size:18px; text-align:center; gap:16px;
  }
  #startBtn button {
    padding:16px 32px; font-size:18px; border-radius:8px; border:none;
    background:#4a90e2; color:#fff;
  }
  #rotateWarn {
    position:fixed; inset:0; z-index:20; background:#000; color:#fff;
    display:none; align-items:center; justify-content:center; font-family:sans-serif; text-align:center; padding:20px;
  }
  @media (orientation: portrait) { #rotateWarn { display:flex; } #canvas-wrap { display:none; } }
</style>
</head>
<body>

<div id="rotateWarn">Tourne ton iPhone en mode paysage 📱↻</div>

<div id="debugPanel" style="position:fixed; top:8px; left:8px; z-index:15; background:rgba(0,0,0,0.6); color:#fff; font-family:sans-serif; font-size:12px; padding:8px; border-radius:6px; display:none;">
  <div>Salle: <span id="roomScaleVal">1.0</span></div>
  <input type="range" id="roomScale" min="0.01" max="5" step="0.01" value="1" style="width:140px;">
  <div>Perso: <span id="charScaleVal">1.0</span></div>
  <input type="range" id="charScale" min="0.01" max="5" step="0.01" value="1" style="width:140px;">
</div>

<div id="startBtn">
  <div>Démo VR cardboard<br>(à tester sur iPhone, en paysage, dans Safari)</div>
  <button id="go">Activer la caméra VR</button>
</div>

<div id="canvas-wrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
let scene, camera, renderer, roomGroup, character;
let roomModel = null; // référence au vrai modèle de salle une fois chargé
let orientation = { alpha: 0, beta: 0, gamma: 0 };
let baseAlpha = null; // pour recaler le "devant" au démarrage

// Constantes réutilisées à chaque frame pour la correction d'orientation
const zeeAxis = new THREE.Vector3(0, 0, 1);
const qCorrection = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
const qScreen = new THREE.Quaternion();

function getScreenOrientationRad() {
  if (screen.orientation && typeof screen.orientation.angle === 'number') {
    return THREE.MathUtils.degToRad(screen.orientation.angle);
  }
  if (typeof window.orientation === 'number') {
    return THREE.MathUtils.degToRad(window.orientation);
  }
  return 0;
}

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202030);

  camera = new THREE.Object3D(); // rig, contient les 2 vraies caméras stéréo

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  // --- Placeholders temporaires, remplacés dès que les .glb sont chargés ---
  roomGroup = new THREE.Group();
  const floorGeo = new THREE.PlaneGeometry(10, 10);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x555566 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  roomGroup.add(floor);
  scene.add(roomGroup);

  const charGeo = new THREE.BoxGeometry(0.6, 1.6, 0.4);
  const charMat = new THREE.MeshStandardMaterial({ color: 0xe27d4a });
  character = new THREE.Mesh(charGeo, charMat);
  character.position.set(0, 0.8, -2.5);
  scene.add(character);

  // --- Chargement des vrais modèles Blender (.glb) ---
  const loader = new THREE.GLTFLoader();

  loader.load('salle.glb', (gltf) => {
    scene.remove(roomGroup); // on retire le placeholder
    const room = gltf.scene;
    room.scale.set(1, 1, 1); // ← change ici si la salle est trop grande/petite, ex: 0.1 pour diviser par 10
    room.position.set(0, 0, 0); // ajuste si ta salle n'est pas centrée à l'origine dans Blender
    scene.add(room);
    roomModel = room;
  }, undefined, (err) => {
    console.warn('salle.glb introuvable, placeholder conservé', err);
  });

  loader.load('personnage.glb', (gltf) => {
    scene.remove(character); // on retire le placeholder
    character = gltf.scene;
    character.scale.set(1, 1, 1); // ← ajuste ici si besoin
    character.position.set(0, 0, -2.5); // ajuste la position dans la salle
    scene.add(character);
  }, undefined, (err) => {
    console.warn('personnage.glb introuvable, placeholder conservé', err);
  });

  const light = new THREE.HemisphereLight(0xffffff, 0x222233, 1.2);
  scene.add(light);
  const point = new THREE.PointLight(0xffffff, 0.6);
  point.position.set(0, 3, 0);
  scene.add(point);

  scene.add(camera);
  camera.position.set(0, 1.6, 0); // hauteur des yeux

  window.addEventListener('resize', onResize);
}

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- Gestion gyroscope (iOS nécessite une permission explicite) ---
function handleOrientation(e) {
  orientation.alpha = e.alpha || 0;
  orientation.beta = e.beta || 0;
  orientation.gamma = e.gamma || 0;
  if (baseAlpha === null) baseAlpha = orientation.alpha;
}

function requestGyroPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation, true);
          startExperience();
        } else {
          alert("Permission gyroscope refusée.");
        }
      })
      .catch(console.error);
  } else {
    // Android / anciens navigateurs
    window.addEventListener('deviceorientation', handleOrientation, true);
    startExperience();
  }
}

function startExperience() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('debugPanel').style.display = 'block';
  if (!renderer) initScene();
  requestAnimationFrame(animate);
}

// --- Sliders de debug pour trouver la bonne échelle en live ---
document.getElementById('roomScale').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  document.getElementById('roomScaleVal').textContent = v.toFixed(2);
  if (roomModel) roomModel.scale.set(v, v, v);
});
document.getElementById('charScale').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  document.getElementById('charScaleVal').textContent = v.toFixed(2);
  if (character) character.scale.set(v, v, v);
});

// Applique l'orientation du téléphone au rig caméra
const eulerTmp = new THREE.Euler();

function updateCameraFromOrientation() {
  const alpha = THREE.MathUtils.degToRad(orientation.alpha || 0);
  const beta = THREE.MathUtils.degToRad(orientation.beta || 0);
  const gamma = THREE.MathUtils.degToRad(orientation.gamma || 0);
  const screenAngle = getScreenOrientationRad();

  eulerTmp.set(beta, alpha, -gamma, 'YXZ');
  camera.quaternion.setFromEuler(eulerTmp);
  camera.quaternion.multiply(qCorrection);
  camera.quaternion.multiply(qScreen.setFromAxisAngle(zeeAxis, -screenAngle));
}

// --- Rendu stéréo split-screen ---
const eyeSeparation = 0.064; // distance interpupillaire moyenne (m)

function renderStereo() {
  const width = window.innerWidth / 2;
  const height = window.innerHeight;

  const leftCam = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const rightCam = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);

  leftCam.quaternion.copy(camera.quaternion);
  rightCam.quaternion.copy(camera.quaternion);

  const offset = new THREE.Vector3(eyeSeparation / 2, 0, 0).applyQuaternion(camera.quaternion);
  leftCam.position.copy(camera.position).sub(offset);
  rightCam.position.copy(camera.position).add(offset);

  renderer.setScissorTest(true);

  renderer.setViewport(0, 0, width, height);
  renderer.setScissor(0, 0, width, height);
  renderer.render(scene, leftCam);

  renderer.setViewport(width, 0, width, height);
  renderer.setScissor(width, 0, width, height);
  renderer.render(scene, rightCam);

  renderer.setScissorTest(false);
}

function animate() {
  requestAnimationFrame(animate);
  updateCameraFromOrientation();
  character.rotation.y += 0.01; // petite anim pour voir que ça tourne
  renderStereo();
}

document.getElementById('go').addEventListener('click', requestGyroPermission);
</script>
</body>
</html>
